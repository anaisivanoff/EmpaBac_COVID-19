<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImpaBac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Exo+2:ital,wght@0,100..900;1,100..900&family=Lexend+Exa:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="particles-js"></div>

    <div id="content">
        <header>
            <h1>ImpaBac</h1>
        </header>

        <main>
            <section class="content-section">
                <h2>Analyse des Résultats</h2>

                <div class="chart-container">
                    <h3>Taux de Réussite</h3>
                    <canvas id="bacChart"></canvas>
                </div>

                <div class="chart-container">
                    <h3>Nombre Total de Candidats</h3>
                    <canvas id="secondChart"></canvas>
                </div>

                <div class="chart-container">
                    <h3>Obtention du Bac par Filière</h3>
                    <canvas id="thirdChart"></canvas>
                </div>
            </section>

            <section class="content-section">
                <h2>Découvrez maintenant notre documentation!</h2>
                <p>Vous trouverez toutes les ressources utilisées.</p>
                <a href="documentation.html" id="btn-documentation">Voir la Documentation</a>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Impact du Bac - Tous droits réservés.</p>
        </footer>
    </div>

    <script src="js/particles.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
